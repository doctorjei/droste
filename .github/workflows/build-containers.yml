name: Build Container Images

on:
  push:
    branches: [main]
    paths:
      - 'containers/**'
      - 'containers/droste-seed/seed-target.txt'
      - 'oci/seed-oci-exclude.txt'
      - 'oci/vmlinuz'
      - 'oci/initramfs.img'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

# droste-seed is built manually via containers/droste-seed/build-seed.sh
# (requires root, qemu-nbd, chroot) and pushed to GHCR as :latest.
# All other tiers are built here from Containerfiles.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── lint (← seed:latest) ──────────────────────────────────────
      - name: Build and push lint
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-lint/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-lint:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-lint:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-seed:latest
          cache-from: type=gha,scope=lint
          cache-to: type=gha,mode=max,scope=lint

      # ── root (← lint:sha) ────────────────────────────────────────
      - name: Build and push root
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-root/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-root:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-root:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-lint:${{ github.sha }}
          cache-from: type=gha,scope=root
          cache-to: type=gha,mode=max,scope=root

      # ── fiber (← seed:latest) ────────────────────────────────────
      - name: Build and push fiber
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-fiber/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-fiber:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-fiber:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-seed:latest
          cache-from: type=gha,scope=fiber
          cache-to: type=gha,mode=max,scope=fiber

      # ── thread (← fiber:sha) ─────────────────────────────────────
      - name: Build and push thread
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-thread/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-thread:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-thread:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-fiber:${{ github.sha }}
          cache-from: type=gha,scope=thread
          cache-to: type=gha,mode=max,scope=thread

      # ── hair (← thread:sha) ──────────────────────────────────────
      - name: Build and push hair
        uses: docker/build-push-action@v6
