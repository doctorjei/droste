name: Build Container Images

on:
  push:
    branches: [main]
    paths:
      - 'containers/**'
      - 'containers/droste-seed/seed-target.txt'
      - 'oci/seed-oci-exclude.txt'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

# droste-seed is built manually via containers/droste-seed/build-seed.sh
# (requires root, qemu-nbd, chroot) and pushed to GHCR as :latest.
# All other tiers are built here from Containerfiles.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── seed-lxc (← seed:latest) ─────────────────────────────────
      - name: Build and push seed-lxc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-seed-lxc/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-seed-lxc:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-seed-lxc:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-seed:latest
          cache-from: type=gha,scope=seed-lxc
          cache-to: type=gha,mode=max,scope=seed-lxc

      # ── fiber (← seed:latest) ────────────────────────────────────
      - name: Build and push fiber
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-fiber/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-fiber:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-fiber:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-seed:latest
          cache-from: type=gha,scope=fiber
          cache-to: type=gha,mode=max,scope=fiber

      # ── fiber-lxc (← fiber:sha) ──────────────────────────────────
      - name: Build and push fiber-lxc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-fiber-lxc/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-fiber-lxc:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-fiber-lxc:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-fiber:${{ github.sha }}
          cache-from: type=gha,scope=fiber-lxc
          cache-to: type=gha,mode=max,scope=fiber-lxc

      # ── sheet (← fiber:sha) ──────────────────────────────────────
      - name: Build and push sheet
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-sheet/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-sheet:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-sheet:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-fiber:${{ github.sha }}
          cache-from: type=gha,scope=sheet
          cache-to: type=gha,mode=max,scope=sheet

      # ── sheet-lxc (← sheet:sha) ──────────────────────────────────
      - name: Build and push sheet-lxc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-sheet-lxc/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-sheet-lxc:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-sheet-lxc:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-sheet:${{ github.sha }}
          cache-from: type=gha,scope=sheet-lxc
          cache-to: type=gha,mode=max,scope=sheet-lxc

      # ── page (← sheet:sha) ───────────────────────────────────────
      - name: Build and push page
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-page/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-page:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-page:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-sheet:${{ github.sha }}
          cache-from: type=gha,scope=page
          cache-to: type=gha,mode=max,scope=page

      # ── page-lxc (← page:sha) ────────────────────────────────────
