          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-gutenberg:${{ github.sha }}
          cache-from: type=gha,scope=gutenberg-lxc
          cache-to: type=gha,mode=max,scope=gutenberg-lxc
