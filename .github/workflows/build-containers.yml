name: Build Container Images

on:
  push:
    branches: [main]
    paths:
      - 'containers/**'
      - 'containers/droste-seed/seed-target.txt'
      - 'oci/seed-oci-exclude.txt'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push root
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-root/Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-root:latest
          cache-from: type=gha,scope=root
          cache-to: type=gha,mode=max,scope=root

      - name: Build and push hair
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-hair/Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-hair:latest
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-root:latest
          cache-from: type=gha,scope=hair
          cache-to: type=gha,mode=max,scope=hair

      - name: Build and push wool
        uses: docker/build-push-action@v6
        with:
          context: containers/droste-wool/
          file: containers/droste-wool/Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-wool:latest
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-hair:latest
          cache-from: type=gha,scope=wool
          cache-to: type=gha,mode=max,scope=wool

      - name: Build and push felt
        uses: docker/build-push-action@v6
        with:
          context: containers/droste-felt/
          file: containers/droste-felt/Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-felt:latest
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-wool:latest
          cache-from: type=gha,scope=felt
          cache-to: type=gha,mode=max,scope=felt

      - name: Build and push amimono
        uses: docker/build-push-action@v6
        with:
          context: containers/droste-amimono/
          file: containers/droste-amimono/Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-amimono:latest
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-felt:latest
          cache-from: type=gha,scope=amimono
          cache-to: type=gha,mode=max,scope=amimono

      - name: Build and push stuffer
        uses: docker/build-push-action@v6
        with:
          context: containers/droste-stuffer/
          file: containers/droste-stuffer/Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-stuffer:latest
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-amimono:latest
          cache-from: type=gha,scope=stuffer
          cache-to: type=gha,mode=max,scope=stuffer

      - name: Build and push stuffinator
        uses: docker/build-push-action@v6
        with:
          context: containers/droste-stuffinator/
          file: containers/droste-stuffinator/Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-stuffinator:latest
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-stuffer:latest
          cache-from: type=gha,scope=stuffinator
          cache-to: type=gha,mode=max,scope=stuffinator
