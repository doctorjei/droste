          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-tome:${{ github.sha }}
          cache-from: type=gha,scope=tapestry
          cache-to: type=gha,mode=max,scope=tapestry

      # ── amimono (← tapestry:sha) ─────────────────────────────────
      - name: Build and push amimono
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-amimono/Containerfile
          push: true
          tags: |
