            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-page-lxc:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-page:${{ github.sha }}
          cache-from: type=gha,scope=page-lxc
          cache-to: type=gha,mode=max,scope=page-lxc

      # ── tome (← page:sha) ────────────────────────────────────────
      - name: Build and push tome
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-tome/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-tome:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-tome:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-page:${{ github.sha }}
          cache-from: type=gha,scope=tome
          cache-to: type=gha,mode=max,scope=tome

      # ── tome-lxc (← tome:sha) ────────────────────────────────────
      - name: Build and push tome-lxc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-tome-lxc/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-tome-lxc:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-tome-lxc:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-tome:${{ github.sha }}
          cache-from: type=gha,scope=tome-lxc
          cache-to: type=gha,mode=max,scope=tome-lxc

      # ── press (← tome:sha) ───────────────────────────────────────
      - name: Build and push press
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-press/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-press:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-press:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-tome:${{ github.sha }}
