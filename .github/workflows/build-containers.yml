            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-gutenberg:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-press:${{ github.sha }}
          cache-from: type=gha,scope=gutenberg
          cache-to: type=gha,mode=max,scope=gutenberg

      # ── gutenberg-lxc (← gutenberg:sha) ──────────────────────────
      - name: Build and push gutenberg-lxc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/droste-gutenberg-lxc/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/droste-gutenberg-lxc:latest
