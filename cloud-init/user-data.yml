#cloud-config
# Cloud-init user-data template for droste VM boot.
#
# Shell-variable placeholders are substituted by boot-droste.sh
# via envsubst before being passed to the VM.
#
# Required variables:
#   SSH_PUBLIC_KEY    — public SSH key for the droste user
#
# Optional variables:
#   DROSTE_HOSTNAME   — VM hostname (default: droste)

hostname: ${DROSTE_HOSTNAME:-droste}
manage_etc_hosts: true

users:
  - name: droste
    uid: "1000"
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: false
    plain_text_passwd: droste
    ssh_authorized_keys:
      - "${SSH_PUBLIC_KEY}"

ssh_pwauth: true

# Pre-create virtiofs mount point and add fstab entry.
# The mount only succeeds if the VM was started with --share.
runcmd:
  - mkdir -p /mnt/share
  - grep -q virtiofs /etc/fstab || printf 'share\t/mnt/share\tvirtiofs\tdefaults,nofail\t0\t0\n' >> /etc/fstab
  - mount /mnt/share 2>/dev/null || true
