#cloud-config
# Cloud-init user-data template for droste VM boot.
#
# Shell-variable placeholders are substituted by boot-droste.sh
# via envsubst before being passed to the VM.
#
# Required variables:
#   SSH_PUBLIC_KEY    — public SSH key for the droste user
#
# Optional variables:
#   DROSTE_HOSTNAME   — VM hostname (default: droste)

hostname: ${DROSTE_HOSTNAME:-droste}
manage_etc_hosts: true

users:
  - name: droste
    uid: "1000"
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: false
    plain_text_passwd: droste
    ssh_authorized_keys:
      - "${SSH_PUBLIC_KEY}"

ssh_pwauth: true
