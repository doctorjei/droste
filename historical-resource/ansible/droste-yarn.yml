---
# Ansible playbook for droste-yarn: VM-capable layer on top of droste-thread.
#
# Adds QEMU/KVM for nested virtualization, Ansible for automation, and
# cloud-image-utils for creating cloud-init ISOs inside the VM.
#
# This playbook runs on top of an already-provisioned droste-thread image.
# It only installs Phase 2 additions — all Phase 1 config is inherited.
#
# Usage:
#   ansible-playbook droste-yarn.yml -i 'hostname,' -u root

- name: Provision droste-yarn VM layer
  hosts: all
  become: true

  vars:
    yarn_packages:
      # VM
      - qemu-system-x86
      - qemu-utils
      - cloud-image-utils
      - swtpm
      - ovmf
      # Automation
      - ansible
      - gettext-base
      # Virtualization management
      - libvirt-daemon-system
      - virtinst
      - nbdkit
      # Storage
      - lvm2
      - mdadm
      - parted
      - btrfs-progs
      - quota
      - cryptsetup
      - gdisk
      - nbd-client
      - ntfs-3g
      - dosfstools
      - mtools
      # NFS server
      - nfs-kernel-server
      # Hardware
      - ethtool
      - pciutils
      - hdparm
      - dmidecode
      - lshw
      # System
      - cpu-checker
      # Disk usage
      - ncdu
      # Network diagnostics
      - nethogs
      - bmon
      - hping3
      - nicstat
      - bridge-utils
      # Image tools
      - squashfs-tools
      # Storage management
      - thin-provisioning-tools
      # System tuning
      - irqbalance
      - linux-cpupower
      # Benchmarking
      - sysbench
      # Serial
      - picocom

  tasks:
    # ── VM packages ──────────────────────────────────────────────────
    - name: Install VM and automation packages
      ansible.builtin.apt:
        name: "{{ yarn_packages }}"
        state: present
        update_cache: true
        install_recommends: false
      register: batch_result
      failed_when: false

    - name: Identify failed packages
      when: batch_result.failed
      block:
        - name: Try each package individually
          ansible.builtin.apt:
            name: "{{ item }}"
            state: present
            install_recommends: false
          loop: "{{ yarn_packages }}"
          register: individual_results
          failed_when: false

        - name: Report failed packages
          ansible.builtin.fail:
            msg: >-
              Failed to install:
              {{ individual_results.results
                 | selectattr('failed')
                 | map(attribute='item')
                 | join(', ') }}
          when: individual_results.results | selectattr('failed') | list | length > 0

    # ── Nested virtualization ────────────────────────────────────────
    - name: Configure nested virtualization
      ansible.builtin.copy:
        dest: /etc/modprobe.d/kvm-nested.conf
        content: |
          options kvm_intel nested=1
          options kvm_amd nested=1
        mode: "0644"

    # ── Module autoload ──────────────────────────────────────────────
    - name: Configure nbd module autoload
      ansible.builtin.copy:
        dest: /etc/modules-load.d/droste.conf
        content: |
          nbd
        mode: "0644"
