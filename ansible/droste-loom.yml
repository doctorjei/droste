---
# Ansible playbook for droste-loom: C/C++ development and build toolchain.
#
# Adds compilers, build systems, debuggers, and development utilities
# on top of droste-tapestry.
#
# This playbook runs on top of an already-provisioned droste-tapestry image.
# It only installs Phase 5 additions — all Phase 1+2+3+4 config is inherited.
#
# Usage:
#   ansible-playbook droste-loom.yml -i 'hostname,' -u root

- name: Provision droste-loom development layer
  hosts: all
  become: true

  tasks:
    # ── Loom packages ────────────────────────────────────────────────
    - name: Install C/C++ development and build toolchain packages
      ansible.builtin.apt:
        name:
          # Compiler toolchain (gcc-12, g++-12, make, libc-dev, dpkg-dev)
          - build-essential
          # Cross-platform build system generator
          - cmake
          # Compile flag helper
          - pkg-config
          # Autotools configure script generator
          - autoconf
          # Autotools Makefile generator
          - automake
          # Generic library support script
          - libtool
          # GNU debugger
          - gdb
          # Memory error and leak detector
          - valgrind
          # Compiler cache
          - ccache
          # Small fast build system
          - ninja-build
          # Compilation database generator
          - bear
        state: present
        update_cache: true
        install_recommends: false

    # ── Image cleanup ─────────────────────────────────────────────────
    - name: Clean apt cache
      ansible.builtin.apt:
        autoclean: true

    - name: Remove apt lists
      ansible.builtin.shell: rm -rf /var/lib/apt/lists/*
      args:
        executable: /bin/bash
      changed_when: true

    - name: Clear machine-id for cloud-init first-boot
      ansible.builtin.copy:
        dest: /etc/machine-id
        content: ""
        mode: "0444"

    - name: Re-harden SSH (disable password auth after Packer build)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"

    - name: Truncate logs
      ansible.builtin.shell: find /var/log -type f -exec truncate -s 0 {} +
      args:
        executable: /bin/bash
      changed_when: true

    - name: Zero free space for compression
      ansible.builtin.shell: |
        dd if=/dev/zero of=/var/tmp/zeros bs=1M 2>/dev/null || true
        rm -f /var/tmp/zeros
        sync
      args:
        executable: /bin/bash
      changed_when: true
