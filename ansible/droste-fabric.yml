---
# Ansible playbook for droste-fabric: HA, storage, and cluster layer.
#
# Adds Pacemaker/Corosync HA stack, DRBD replicated storage, iSCSI,
# Ceph client, and cluster tools on top of droste-full.
#
# This playbook runs on top of an already-provisioned droste-full image.
# It only installs Phase 3 additions — all Phase 1+2 config is inherited.
#
# Usage:
#   ansible-playbook droste-fabric.yml -i 'hostname,' -u root

- name: Provision droste-fabric cluster layer
  hosts: all
  become: true

  tasks:
    # ── Fabric packages ───────────────────────────────────────────────
    - name: Install HA, storage, and cluster packages
      ansible.builtin.apt:
        name:
          # DRBD (module built into cloud kernel)
          - drbd-utils
          # Pacemaker/HA
          - pacemaker
          - pacemaker-cli-utils
          - pcs
          - resource-agents
          - sbd
          - fence-agents
          - keepalived
          # Cluster
          - dlm-controld
          # iSCSI
          - open-iscsi
          - targetcli-fb
          # Storage
          - ceph-common
          - multipath-tools
          # Networking
          - ebtables
          # PXE
          - syslinux-common
          # Cluster tools
          - clustershell
          # System
          - numactl
        state: present
        update_cache: true
        install_recommends: false

    # ── Module autoload ───────────────────────────────────────────────
    - name: Add drbd to module autoload
      ansible.builtin.lineinfile:
        path: /etc/modules-load.d/droste.conf
        line: "drbd"

    # ── Image cleanup ─────────────────────────────────────────────────
    - name: Clean apt cache
      ansible.builtin.apt:
        autoclean: true

    - name: Remove apt lists
      ansible.builtin.shell: rm -rf /var/lib/apt/lists/*
      args:
        executable: /bin/bash
      changed_when: true

    - name: Clear machine-id for cloud-init first-boot
      ansible.builtin.copy:
        dest: /etc/machine-id
        content: ""
        mode: "0444"

    - name: Re-harden SSH (disable password auth after Packer build)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"

    - name: Truncate logs
      ansible.builtin.shell: find /var/log -type f -exec truncate -s 0 {} +
      args:
        executable: /bin/bash
      changed_when: true

    - name: Zero free space for compression
      ansible.builtin.shell: |
        dd if=/dev/zero of=/var/tmp/zeros bs=1M 2>/dev/null || true
        rm -f /var/tmp/zeros
        sync
      args:
        executable: /bin/bash
      changed_when: true
