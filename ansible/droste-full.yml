---
# Ansible playbook for droste-full: VM-capable layer on top of droste-thread.
#
# Adds QEMU/KVM for nested virtualization, Ansible for automation, and
# cloud-image-utils for creating cloud-init ISOs inside the VM.
#
# This playbook runs on top of an already-provisioned droste-thread image.
# It only installs Phase 2 additions — all Phase 1 config is inherited.
#
# Usage:
#   ansible-playbook droste-full.yml -i 'hostname,' -u root

- name: Provision droste-full VM layer
  hosts: all
  become: true

  tasks:
    # ── VM packages ──────────────────────────────────────────────────
    - name: Install VM and automation packages
      ansible.builtin.apt:
        name:
          # VM
          - qemu-system-x86
          - qemu-utils
          - cloud-image-utils
          - swtpm
          - ovmf
          # Automation
          - ansible
          - gettext-base
          # Virtualization management
          - libvirt-daemon-system
          - virtinst
          - nbdkit
          # Storage
          - lvm2
          - mdadm
          - parted
          - btrfs-progs
          - quota
          - cryptsetup
          - gdisk
          - nbd-client
          - ntfs-3g
          - dosfstools
          - mtools
          # NFS server
          - nfs-kernel-server
          # Hardware
          - ethtool
          - pciutils
          - hdparm
          - dmidecode
          - lshw
          # System
          - cpu-checker
          # Disk usage
          - ncdu
          # Network diagnostics
          - nethogs
          - bmon
          - hping3
          # Image tools
          - squashfs-tools
          # System tuning
          - irqbalance
          - cpufrequtils
          # Benchmarking
          - sysbench
          # Serial
          - picocom
        state: present
        update_cache: true
        install_recommends: false

    # ── Nested virtualization ────────────────────────────────────────
    - name: Configure nested virtualization
      ansible.builtin.copy:
        dest: /etc/modprobe.d/kvm-nested.conf
        content: |
          options kvm_intel nested=1
          options kvm_amd nested=1
        mode: "0644"

    # ── Module autoload ──────────────────────────────────────────────
    - name: Configure nbd module autoload
      ansible.builtin.copy:
        dest: /etc/modules-load.d/droste.conf
        content: |
          nbd
        mode: "0644"

    # ── Image cleanup ────────────────────────────────────────────────
    - name: Clean apt cache
      ansible.builtin.apt:
        autoclean: true

    - name: Remove apt lists
      ansible.builtin.shell: rm -rf /var/lib/apt/lists/*
      args:
        executable: /bin/bash
      changed_when: true

    - name: Clear machine-id for cloud-init first-boot
      ansible.builtin.copy:
        dest: /etc/machine-id
        content: ""
        mode: "0444"

    - name: Re-harden SSH (disable password auth after Packer build)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"

    - name: Truncate logs
      ansible.builtin.shell: find /var/log -type f -exec truncate -s 0 {} +
      args:
        executable: /bin/bash
      changed_when: true

    - name: Zero free space for compression
      ansible.builtin.shell: |
        dd if=/dev/zero of=/var/tmp/zeros bs=1M 2>/dev/null || true
        rm -f /var/tmp/zeros
        sync
      args:
        executable: /bin/bash
      changed_when: true
