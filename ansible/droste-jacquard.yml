---
# Ansible playbook for droste-jacquard: Proxmox VE testing environment.
#
# Adds the Proxmox no-subscription repository, installs the proxmox-ve
# metapackage (PVE kernel, pve-manager, ZFS, corosync, etc.), and removes
# the Debian stock kernel.
#
# This playbook runs on top of an already-provisioned droste-loom image.
# It only installs Phase 6 additions — all Phase 1+2+3+4+5 config is inherited.
#
# Usage:
#   ansible-playbook droste-jacquard.yml -i 'hostname,' -u root

- name: Provision droste-jacquard Proxmox VE layer
  hosts: all
  become: true

  tasks:
    # ── Proxmox repository setup ──────────────────────────────────────
    - name: Download Proxmox GPG key
      ansible.builtin.get_url:
        url: https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg
        dest: /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
        mode: "0644"

    - name: Add PVE no-subscription repository
      ansible.builtin.apt_repository:
        repo: deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription
        filename: pve-no-subscription
        update_cache: true

    # ── Preseed postfix to avoid interactive prompt ────────────────────
    - name: Preseed postfix configuration
      ansible.builtin.debconf:
        name: postfix
        question: postfix/main_mailer_type
        value: "No configuration"
        vtype: select

    # ── Install Proxmox VE ─────────────────────────────────────────────
    # Suppress service startup during install — PVE daemons (pve-cluster,
    # pvedaemon, pveproxy) fail without a real cluster config.
    - name: Suppress service startup during install
      ansible.builtin.copy:
        dest: /usr/sbin/policy-rc.d
        content: "exit 101"
        mode: "0755"

    # The genericcloud base image excludes /usr/share/doc/* via dpkg config.
    # pve-manager postinst tries to copy aplinfo.dat from there and fails.
    # Override with a path-include so dpkg extracts pve-manager docs.
    - name: Allow pve-manager docs past dpkg path-exclude
      ansible.builtin.copy:
        dest: /etc/dpkg/dpkg.cfg.d/pve-manager-docs
        content: "path-include=/usr/share/doc/pve-manager/*"
        mode: "0644"

    # Install everything in one apt call so dependency resolution doesn't
    # try to remove proxmox-ve (which triggers the pve-apt-hook blocker).
    # zfsutils-linux is excluded by install_recommends: false, so list it
    # explicitly.
    - name: Install proxmox-ve with ZFS
      ansible.builtin.apt:
        name:
          - proxmox-ve
          - zfsutils-linux
        state: present
        update_cache: true
        install_recommends: false
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Remove policy-rc.d
      ansible.builtin.file:
        path: /usr/sbin/policy-rc.d
        state: absent

    # The PVE enterprise repo requires a subscription — remove it to
    # avoid apt update failures at runtime.
    - name: Remove PVE enterprise repository
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pve-enterprise.list
        state: absent

    # ── Remove Debian stock kernel ─────────────────────────────────────
    - name: Remove Debian stock kernel metapackage
      ansible.builtin.apt:
        name:
          - linux-image-amd64
        state: absent
        purge: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Purge Debian stock kernel images
      ansible.builtin.shell: apt-get purge -y linux-image-6.1* 2>/dev/null || true
      args:
        executable: /bin/bash
      changed_when: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Update GRUB for PVE kernel
      ansible.builtin.command: update-grub
      changed_when: true

    # ── Image cleanup ─────────────────────────────────────────────────
    - name: Clean apt cache
      ansible.builtin.apt:
        autoclean: true

    - name: Remove apt lists
      ansible.builtin.shell: rm -rf /var/lib/apt/lists/*
      args:
        executable: /bin/bash
      changed_when: true

    - name: Clear machine-id for cloud-init first-boot
      ansible.builtin.copy:
        dest: /etc/machine-id
        content: ""
        mode: "0444"

    - name: Re-harden SSH (disable password auth after Packer build)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"

    - name: Truncate logs
      ansible.builtin.shell: find /var/log -type f -exec truncate -s 0 {} +
      args:
        executable: /bin/bash
      changed_when: true

    - name: Zero free space for compression
      ansible.builtin.shell: |
        dd if=/dev/zero of=/var/tmp/zeros bs=1M 2>/dev/null || true
        rm -f /var/tmp/zeros
        sync
      args:
        executable: /bin/bash
      changed_when: true
